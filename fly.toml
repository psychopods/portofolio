app = "paschal-timoth-portofolio"
primary_region = "ams"

[http_service]
  internal_port = 4321
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  PORT = "4321"
  DATABASE_PATH = "/data/data.db"

[[mounts]]
  source = "portfolio_data"
  destination = "/data"
