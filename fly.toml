# fly.toml app configuration file generated for paschal-timoth-portofolio on 2026-06-09T18:45:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paschal-timoth-portofolio'
primary_region = 'ams'

[build]

[env]
  DATABASE_PATH = '/data/data.db'
  PORT = '4321'

[[mounts]]
  source = 'portfolio_data'
  destination = '/data'

[http_service]
  internal_port = 4321
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
